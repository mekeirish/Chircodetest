<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧑‍⚕️ Chirurgien V4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #f6f8fa;
            --surface: #ffffff;
            --text: #1f2328;
            --border: #d0d7de;
            --primary: #0969da;
            --danger: #cf222e;
            --success: #2da44e;
            --warning: #d4a72c;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0d1117;
            --surface: #161b22;
            --text: #f0f6fc;
            --border: #30363d;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 span {
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 500;
        }
        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow);
        }
        .theme-toggle:hover {
            opacity: 0.8;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .card-title small {
            font-weight: 400;
            font-size: 13px;
            opacity: 0.7;
        }
        textarea {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
            min-height: 120px;
            line-height: 1.6;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        }
        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-success {
            background: var(--success);
        }
        .btn-warning {
            background: var(--warning);
            color: #000;
        }
        .btn-download {
            background: #6f42c1;
        }
        .btn-download:hover {
            background: #5a32a3;
        }
        .btn-pur {
            background: #1a7f37;
        }
        .btn-pur:hover {
            background: #146c2e;
        }
        .btn-validate {
            background: #d97706;
        }
        .btn-validate:hover {
            background: #b45309;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .actions-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 14px;
            align-items: center;
        }
        .fragment-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }
        .fragment-chip {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            user-select: none;
        }
        .fragment-chip:hover {
            border-color: var(--primary);
            background: var(--surface);
            transform: scale(1.02);
        }
        .fragment-chip .badge {
            background: var(--primary);
            color: #fff;
            border-radius: 20px;
            padding: 0 10px;
            font-size: 11px;
            line-height: 20px;
        }
        .fragment-chip .del {
            color: var(--danger);
            font-weight: 700;
            margin-left: 4px;
            cursor: pointer;
            opacity: 0.6;
        }
        .fragment-chip .del:hover {
            opacity: 1;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 800px;
            width: 100%;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        .modal h2 {
            margin-bottom: 8px;
        }
        .modal textarea {
            min-height: 300px;
            flex: 1;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            justify-content: flex-end;
        }
        .empty-state {
            opacity: 0.6;
            font-style: italic;
            padding: 10px 0;
        }
        .preview-wrapper {
            margin-top: 16px;
            border-top: 1px dashed var(--border);
            padding-top: 16px;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .preview-header strong {
            font-size: 14px;
        }
        .btn-copy {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
        }
        .btn-copy:hover {
            background: var(--bg);
        }
        .stats {
            font-size: 13px;
            opacity: 0.7;
            margin-left: auto;
        }
        .tab-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab-actions .btn {
            flex: 1;
            justify-content: center;
            min-width: 120px;
        }
        .badge-pur {
            background: #1a7f37;
            color: #fff;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
        }
        .error-marker {
            color: var(--danger);
            font-weight: 600;
        }
        .validation-result {
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .validation-pass {
            background: rgba(45, 164, 78, 0.15);
            border: 1px solid var(--success);
            color: var(--success);
        }
        .validation-fail {
            background: rgba(207, 34, 46, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }
            .card {
                padding: 16px;
            }
            .modal {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // ÉTAT
            // ============================================================
            let fragments = [];
            let rawInput = '';
            let theme = 'light';
            let assembledCode = '';
            let pureCode = '';
            let fullHtmlCode = '';
            let modal = null;
            let validationResult = '';

            const STORAGE_KEY = 'codeSurgeon_fragments';
            const STORAGE_RAW_KEY = 'codeSurgeon_rawInput';
            const STORAGE_THEME_KEY = 'theme';

            const app = document.getElementById('app');

            // ============================================================
            // VALIDATION SYNTAXIQUE (avec Function constructor)
            // ============================================================
            function validateSyntax(code) {
                const errors = [];
                const lines = code.split('\n');

                // 1. Vérifier les chaînes sans guillemets
                const stringRegex = /const\s+\w+\s*=\s*([^'";`\s][^;]*?)(;|$)/g;
                let match;
                while ((match = stringRegex.exec(code)) !== null) {
                    const raw = match[1].trim();
                    // Si ça ressemble à du texte sans guillemets
                    if (raw && !raw.startsWith('"') && !raw.startsWith("'") && !raw.startsWith('`') &&
                        !raw.startsWith('{') && !raw.startsWith('[') && !raw.startsWith('(') &&
                        !raw.startsWith('new') && !raw.startsWith('function') && !raw.startsWith('class') &&
                        !raw.match(/^[0-9]/)) {
                        const lineNum = code.substring(0, match.index).split('\n').length;
                        errors.push(`Ligne ${lineNum}: Chaîne sans guillemets → "${raw}"`);
                    }
                }

                // 2. Vérifier les parenthèses, crochets, accolades
                const chars = code.split('');
                const stack = [];
                const pairs = { '(': ')', '[': ']', '{': '}' };
                const openers = new Set(['(', '[', '{']);
                const closers = new Set([')', ']', '}']);
                for (let i = 0; i < chars.length; i++) {
                    const c = chars[i];
                    // Ignorer les chaînes
                    if (c === '"' || c === "'" || c === '`') {
                        const quote = c;
                        i++;
                        while (i < chars.length && chars[i] !== quote) {
                            if (chars[i] === '\\') i++;
                            i++;
                        }
                        continue;
                    }
                    if (openers.has(c)) {
                        stack.push({ char: c, index: i });
                    } else if (closers.has(c)) {
                        const last = stack.pop();
                        if (!last || pairs[last.char] !== c) {
                            const lineNum = code.substring(0, i).split('\n').length;
                            errors.push(`Ligne ${lineNum}: ${c} non fermé ou mal apparié`);
                        }
                    }
                }
                if (stack.length > 0) {
                    const last = stack[stack.length - 1];
                    const lineNum = code.substring(0, last.index).split('\n').length;
                    errors.push(`Ligne ${lineNum}: ${last.char} non fermé`);
                }

                // 3. Vérifier les points-virgules manquants (approximatif)
                const lines2 = code.split('\n');
                for (let i = 0; i < lines2.length; i++) {
                    const line = lines2[i].trim();
                    if (line && !line.endsWith('{') && !line.endsWith('}') && !line.endsWith(';') &&
                        !line.endsWith('(') && !line.endsWith('[') && !line.endsWith(',') &&
                        !line.startsWith('//') && !line.startsWith('/*') && !line.startsWith('*') &&
                        !line.endsWith('=>') && !line.endsWith('return')) {
                        // Vérifier si c'est une déclaration qui devrait avoir un ;
                        if (line.match(/^(const|let|var|function|class|return|break|continue|throw)/)) {
                            errors.push(`Ligne ${i+1}: Point-virgule manquant → "${line}"`);
                        }
                    }
                }

                return errors;
            }

            function runValidation() {
                if (fragments.length === 0) {
                    validationResult = '⚠️ Aucun fragment à valider.';
                    render();
                    return;
                }
                const pure = fragments.map(f => f.content).join('\n\n');
                const errors = validateSyntax(pure);
                if (errors.length === 0) {
                    validationResult = '✅ Aucune erreur syntaxique détectée !';
                } else {
                    validationResult = '❌ ' + errors.length + ' erreur(s) détectée(s) :\n' + errors.join('\n');
                }
                render();
            }

            // ============================================================
            // TEMPLATE HTML COMPLET
            // ============================================================
            function buildFullHtml(pureCode) {
                const escaped = pureCode
                    .replace(/\\/g, '\\\\')
                    .replace(/`/g, '\\`')
                    .replace(/\$/g, '\\$');

                return '<!DOCTYPE html>\n' +
                    '<html lang="fr">\n' +
                    '<head>\n' +
                    '    <meta charset="UTF-8">\n' +
                    '    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">\n' +
                    '    <title>App</title>\n' +
                    '    <script src="https://cdn.tailwindcss.com"><\/script>\n' +
                    '    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"><\/script>\n' +
                    '    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"><\/script>\n' +
                    '    <style>\n' +
                    '        body { background: #030712; margin: 0; padding: 0; font-family: system-ui; }\n' +
                    '        #root { display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100%; }\n' +
                    '    </style>\n' +
                    '</head>\n' +
                    '<body>\n' +
                    '    <div id="root"></div>\n' +
                    '    <script>\n' +
                    '        (function() {\n' +
                    '            window.onerror = function(msg) { console.error("ERREUR:", msg); return false; };\n' +
                    '            const { useState, useEffect, useCallback, useMemo, useRef, memo } = React;\n' +
                    '            ' + escaped + '\n' +
                    '            const root = ReactDOM.createRoot(document.getElementById("root"));\n' +
                    '            root.render(React.createElement(App));\n' +
                    '        })();\n' +
                    '    <\/script>\n' +
                    '</body>\n' +
                    '</html>';
            }

            // ============================================================
            // FONCTIONS
            // ============================================================
            function loadState() {
                const savedFrags = localStorage.getItem(STORAGE_KEY);
                const savedRaw = localStorage.getItem(STORAGE_RAW_KEY);
                const savedTheme = localStorage.getItem(STORAGE_THEME_KEY);

                if (savedFrags) { try { fragments = JSON.parse(savedFrags); } catch (e) {} }
                if (savedRaw) rawInput = savedRaw;
                if (savedTheme) {
                    theme = savedTheme;
                    document.documentElement.setAttribute('data-theme', savedTheme);
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            }

            function saveFragments() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(fragments));
            }

            function saveRaw() {
                localStorage.setItem(STORAGE_RAW_KEY, rawInput);
            }

            function saveTheme() {
                localStorage.setItem(STORAGE_THEME_KEY, theme);
            }

            function parseFragments() {
                const regex = /---FRAGMENT:\s*([^\n]+?)\s*---([\s\S]*?)---END---/g;
                const matches = [];
                let match;
                let temp = rawInput;
                while ((match = regex.exec(temp)) !== null) {
                    const id = match[1].trim();
                    const content = match[2].trim();
                    const existingIndex = matches.findIndex(f => f.id === id);
                    if (existingIndex !== -1) {
                        matches[existingIndex].content = content;
                    } else {
                        matches.push({ id, content });
                    }
                }
                if (matches.length === 0) {
                    alert('⚠️ Aucun fragment trouvé ! Vérifie le format : ---FRAGMENT: Nom --- ... ---END---');
                    return;
                }
                fragments = matches;
                assembledCode = '';
                pureCode = '';
                fullHtmlCode = '';
                validationResult = '';
                saveFragments();
                render();
                console.log('✅ Fragments découpés :', fragments.length);
            }

            function updateFragment(id, newContent) {
                const index = fragments.findIndex(f => f.id === id);
                if (index !== -1) {
                    fragments[index].content = newContent.trim();
                }
                modal = null;
                assembledCode = '';
                pureCode = '';
                fullHtmlCode = '';
                validationResult = '';
                saveFragments();
                render();
                console.log('✅ Fragment mis à jour :', id);
            }

            function deleteFragment(id) {
                if (!confirm(`Supprimer définitivement le fragment "${id}" ?`)) return;
                fragments = fragments.filter(f => f.id !== id);
                assembledCode = '';
                pureCode = '';
                fullHtmlCode = '';
                validationResult = '';
                saveFragments();
                render();
                console.log('🗑️ Fragment supprimé :', id);
            }

            function reconstructTagged() {
                if (fragments.length === 0) { alert('Aucun fragment.'); return; }
                assembledCode = fragments.map(f => `---FRAGMENT: ${f.id} ---\n${f.content}\n---END---`).join('\n\n');
                pureCode = '';
                fullHtmlCode = '';
                validationResult = '';
                render();
                console.log('🧩 Assemblé avec balises :', assembledCode.length, 'caractères');
            }

            function reconstructPure() {
                if (fragments.length === 0) { alert('Aucun fragment.'); return; }
                pureCode = fragments.map(f => f.content).join('\n\n');
                assembledCode = '';
                fullHtmlCode = '';
                validationResult = '';
                render();
                console.log('⚡ Code PUR généré :', pureCode.length, 'caractères');
            }

            function downloadFullHtml() {
                if (fragments.length === 0) { alert('Aucun fragment.'); return; }
                const pure = fragments.map(f => f.content).join('\n\n');
                const fullHtml = buildFullHtml(pure);

                const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'app-test.html';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);

                fullHtmlCode = fullHtml;
                assembledCode = '';
                pureCode = '';
                validationResult = '';
                render();
                console.log('📥 HTML complet téléchargé');
            }

            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => { alert('✅ Copié !'); })['catch'](() => {
                        fallbackCopy(text);
                    });
                } else { fallbackCopy(text); }
            }

            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                alert('✅ Copié !');
            }

            function toggleTheme() {
                theme = (theme === 'light' ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
                saveTheme();
                render();
            }

            function clearAll() {
                if (!confirm('Effacer tous les fragments ?')) return;
                fragments = [];
                assembledCode = '';
                pureCode = '';
                fullHtmlCode = '';
                validationResult = '';
                saveFragments();
                render();
            }

            function openModal(id, content) {
                modal = { id, content };
                render();
                setTimeout(() => {
                    const ta = document.querySelector('.modal textarea');
                    if (ta) ta.focus();
                }, 50);
            }

            function closeModal() {
                modal = null;
                render();
            }

            function handleModalConfirm() {
                const ta = document.querySelector('.modal textarea');
                if (!ta) return;
                const content = ta.value;
                if (content.trim() === '') { alert('Le contenu ne peut pas être vide.'); return; }
                updateFragment(modal.id, content);
            }

            // ============================================================
            // RENDU
            // ============================================================
            function render() {
                const themeIcon = theme === 'light' ? '🌙 Mode Nuit' : '☀️ Mode Jour';
                const fragCount = fragments.length;

                let modalHtml = '';
                if (modal) {
                    modalHtml = `
                        <div class="modal-overlay" id="modalOverlay">
                            <div class="modal">
                                <h2>✂️ Modification : <span style="color: var(--primary);">${escapeHtml(modal.id)}</span></h2>
                                <textarea id="modalTextarea">${escapeHtml(modal.content)}</textarea>
                                <div class="modal-actions">
                                    <button class="btn btn-outline" id="modalCancelBtn">Annuler</button>
                                    <button class="btn btn-success" id="modalConfirmBtn">✅ Valider</button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                let fragmentsHtml = '';
                if (fragments.length === 0) {
                    fragmentsHtml = `<div class="empty-state">Aucun fragment pour l'instant. Colle et découpe !</div>`;
                } else {
                    let chips = '';
                    fragments.forEach(f => {
                        const lines = f.content.split('\n').length;
                        const safeId = escapeHtml(f.id);
                        chips += `
                            <div class="fragment-chip" data-id="${safeId}">
                                <span>📄 ${safeId}</span>
                                <span class="badge">${lines} lignes</span>
                                <span class="del" data-id="${safeId}">✕</span>
                            </div>
                        `;
                    });
                    fragmentsHtml = `<div class="fragment-grid">${chips}</div>`;
                }

                let previewHtml = '';

                if (assembledCode) {
                    previewHtml += `
                        <div class="preview-wrapper" style="border-color: var(--warning);">
                            <div class="preview-header">
                                <strong>🧩 Avec balises</strong>
                                <span class="badge-pur">${assembledCode.split('\n').length} lignes</span>
                                <button class="btn-copy" data-copy="${escapeHtml(assembledCode)}">📋 Copier</button>
                            </div>
                            <textarea readonly style="min-height:150px; border-color: var(--warning);">${escapeHtml(assembledCode)}</textarea>
                        </div>
                    `;
                }

                if (pureCode) {
                    previewHtml += `
                        <div class="preview-wrapper" style="border-color: var(--success);">
                            <div class="preview-header">
                                <strong>⚡ Code PUR (sans balises)</strong>
                                <span class="badge-pur">${pureCode.split('\n').length} lignes</span>
                                <button class="btn-copy" data-copy="${escapeHtml(pureCode)}">📋 Copier</button>
                            </div>
                            <textarea readonly style="min-height:150px; border-color: var(--success); background: #0d1117; color: #e6e6e6;">${escapeHtml(pureCode)}</textarea>
                        </div>
                    `;
                }

                if (fullHtmlCode) {
                    previewHtml += `
                        <div class="preview-wrapper" style="border-color: #6f42c1;">
                            <div class="preview-header">
                                <strong>📦 HTML complet (avec squelette)</strong>
                                <span class="badge-pur">${fullHtmlCode.split('\n').length} lignes</span>
                                <button class="btn-copy" data-copy="${escapeHtml(fullHtmlCode)}">📋 Copier</button>
                            </div>
                            <textarea readonly style="min-height:250px; border-color: #6f42c1; background: #0d1117; color: #e6e6e6;">${escapeHtml(fullHtmlCode)}</textarea>
                        </div>
                    `;
                }

                // Validation result
                let validationHtml = '';
                if (validationResult) {
                    const isPass = validationResult.includes('✅');
                    const cls = isPass ? 'validation-pass' : 'validation-fail';
                    validationHtml = `
                        <div class="validation-result ${cls}">${escapeHtml(validationResult)}</div>
                    `;
                }

                const html = `
                    <div id="app-container">
                        <header class="header">
                            <h1>🧑‍⚕️ Chirurgien V4 <span>Validateur</span></h1>
                            <button class="theme-toggle" id="themeToggleBtn">${themeIcon}</button>
                        </header>

                        <!-- CARTE 1 : IMPORT -->
                        <div class="card">
                            <div class="card-title">
                                📥 1. Colle le code balisé
                                <small>(---FRAGMENT: Nom --- ... ---END---)</small>
                            </div>
                            <textarea id="rawTextarea" style="min-height:140px;" placeholder="Colle ici le code balisé par l'IA...">${escapeHtml(rawInput)}</textarea>
                            <div class="actions-row">
                                <button class="btn" id="parseBtn">✂️ Découper en fragments</button>
                                <span class="stats">${fragCount} fragment${fragCount > 1 ? 's' : ''} en mémoire</span>
                                ${fragCount > 0 ? `<button class="btn btn-danger" id="clearAllBtn">🗑️ Effacer tout</button>` : ''}
                            </div>
                        </div>

                        <!-- CARTE 2 : FRAGMENTS -->
                        <div class="card">
                            <div class="card-title">
                                🎯 2. Fragments (clique pour modifier)
                                <small>${fragCount} bloc(s)</small>
                            </div>
                            ${fragmentsHtml}
                        </div>

                        <!-- CARTE 3 : TROIS BOUTONS + VALIDATION -->
                        <div class="card">
                            <div class="card-title">🚀 3. Reconstruire</div>
                            <div class="tab-actions">
                                <button class="btn btn-warning" id="reconstructTaggedBtn" ${fragCount === 0 ? 'disabled' : ''}>🧩 Avec balises</button>
                                <button class="btn btn-pur" id="reconstructPureBtn" ${fragCount === 0 ? 'disabled' : ''}>⚡ Code PUR</button>
                                <button class="btn btn-validate" id="validateBtn" ${fragCount === 0 ? 'disabled' : ''}>🔍 Vérifier syntaxe</button>
                                <button class="btn btn-download" id="downloadHtmlBtn" ${fragCount === 0 ? 'disabled' : ''}>📥 Télécharger HTML</button>
                            </div>
                            ${validationHtml}
                            ${previewHtml}
                        </div>

                        ${modalHtml}
                    </div>
                `;

                app.innerHTML = html;

                // --- ATTACHEMENT DES ÉVÉNEMENTS ---
                document.getElementById('rawTextarea')?.addEventListener('input', (e) => {
                    rawInput = e.target.value;
                    saveRaw();
                });

                document.getElementById('parseBtn')?.addEventListener('click', parseFragments);
                document.getElementById('clearAllBtn')?.addEventListener('click', clearAll);
                document.getElementById('themeToggleBtn')?.addEventListener('click', toggleTheme);
                document.getElementById('reconstructTaggedBtn')?.addEventListener('click', reconstructTagged);
                document.getElementById('reconstructPureBtn')?.addEventListener('click', reconstructPure);
                document.getElementById('validateBtn')?.addEventListener('click', runValidation);
                document.getElementById('downloadHtmlBtn')?.addEventListener('click', downloadFullHtml);

                // Copie via data-copy
                document.querySelectorAll('[data-copy]').forEach(el => {
                    el.addEventListener('click', () => {
                        const text = el.dataset.copy;
                        copyToClipboard(text);
                    });
                });

                // Fragments chips
                document.querySelectorAll('.fragment-chip').forEach(chip => {
                    chip.addEventListener('click', (e) => {
                        if (e.target.classList.contains('del')) return;
                        const id = chip.dataset.id;
                        const found = fragments.find(f => f.id === id);
                        if (found) openModal(id, found.content);
                    });
                });

                document.querySelectorAll('.fragment-chip .del').forEach(del => {
                    del.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = del.dataset.id;
                        deleteFragment(id);
                    });
                });

                // Modal
                const overlay = document.getElementById('modalOverlay');
                if (overlay) {
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) closeModal();
                    });
                }
                document.getElementById('modalCancelBtn')?.addEventListener('click', closeModal);
                document.getElementById('modalConfirmBtn')?.addEventListener('click', handleModalConfirm);

                document.addEventListener('keydown', function escHandler(e) {
                    if (e.key === 'Escape' && modal) {
                        closeModal();
                        document.removeEventListener('keydown', escHandler);
                    }
                });
            }

            function escapeHtml(unsafe) {
                if (unsafe === undefined || unsafe === null) return '';
                const div = document.createElement('div');
                div.textContent = unsafe;
                return div.innerHTML;
            }

            // ============================================================
            // LANCEMENT
            // ============================================================
            loadState();
            render();
            console.log('🧑‍⚕️ Chirurgien V4 chargé');
        })();
    </script>
</body>
</html>
