<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧑‍⚕️ Chirurgien Vanilla V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #f6f8fa;
            --surface: #ffffff;
            --text: #1f2328;
            --border: #d0d7de;
            --primary: #0969da;
            --danger: #cf222e;
            --success: #2da44e;
            --warning: #d4a72c;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0d1117;
            --surface: #161b22;
            --text: #f0f6fc;
            --border: #30363d;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 span {
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 500;
        }
        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow);
        }
        .theme-toggle:hover {
            opacity: 0.8;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .card-title small {
            font-weight: 400;
            font-size: 13px;
            opacity: 0.7;
        }
        textarea {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
            min-height: 120px;
            line-height: 1.6;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        }
        .btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-success {
            background: var(--success);
        }
        .btn-warning {
            background: var(--warning);
            color: #000;
        }
        .btn-download {
            background: #6f42c1;
        }
        .btn-download:hover {
            background: #5a32a3;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .actions-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 14px;
            align-items: center;
        }
        .fragment-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }
        .fragment-chip {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            user-select: none;
        }
        .fragment-chip:hover {
            border-color: var(--primary);
            background: var(--surface);
            transform: scale(1.02);
        }
        .fragment-chip .badge {
            background: var(--primary);
            color: #fff;
            border-radius: 20px;
            padding: 0 10px;
            font-size: 11px;
            line-height: 20px;
        }
        .fragment-chip .del {
            color: var(--danger);
            font-weight: 700;
            margin-left: 4px;
            cursor: pointer;
            opacity: 0.6;
        }
        .fragment-chip .del:hover {
            opacity: 1;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-width: 800px;
            width: 100%;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        .modal h2 {
            margin-bottom: 8px;
        }
        .modal textarea {
            min-height: 300px;
            flex: 1;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            justify-content: flex-end;
        }
        .empty-state {
            opacity: 0.6;
            font-style: italic;
            padding: 10px 0;
        }
        .preview-wrapper {
            margin-top: 16px;
            border-top: 1px dashed var(--border);
            padding-top: 16px;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .preview-header strong {
            font-size: 14px;
        }
        .btn-copy {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
        }
        .btn-copy:hover {
            background: var(--bg);
        }
        .stats {
            font-size: 13px;
            opacity: 0.7;
            margin-left: auto;
        }
        .tab-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab-actions .btn {
            flex: 1;
            justify-content: center;
            min-width: 120px;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }
            .card {
                padding: 16px;
            }
            .modal {
                padding: 16px;
            }
        }
    </style>
</head>

            // ============================================================

            function loadState() {
                var savedFrags = localStorage.getItem(STORAGE_KEY);
                var savedRaw = localStorage.getItem(STORAGE_RAW_KEY);
                var savedTheme = localStorage.getItem(STORAGE_THEME_KEY);

                if (savedFrags) { try { fragments = JSON.parse(savedFrags); } catch (e) {} }
                if (savedRaw) rawInput = savedRaw;
                if (savedTheme) {
                    theme = savedTheme;
                    document.documentElement.setAttribute('data-theme', savedTheme);

                while ((match = regex.exec(temp)) !== null) {
                    var id = match[1].trim();
                    var content = match[2].trim();
                    var existingIndex = -1;
                    for (var i = 0; i < matches.length; i++) {
                        if (matches[i].id === id) { existingIndex = i; break; }
                    }
                    if (existingIndex !== -1) {
                        matches[existingIndex].content = content;
                    } else {
                        matches.push({ id: id, content: content });
                    }
                }
                if (matches.length === 0) {
                    alert('⚠️ Aucun fragment trouvé ! Vérifie le format : ---FRAGMENT: Nom --- ... ---END---');
                    return;
                }
                fragments = matches;
                assembledCode = '';
                pureCode = '';
                fullHtmlCode = '';
                saveFragments();
                render();
            }

            function updateFragment(id, newContent) {
                for (var i = 0; i < fragments.length; i++) {
                    if (fragments[i].id === id) {
                        fragments[i].content = newContent.trim();
                        break;
                    }
                }
                modal = null;
                assembledCode = '';
                pureCode = '';
                fullHtmlCode = '';
                saveFragments();
                render();
            }

            function deleteFragment(id) {
                if (!confirm('Supprimer définitivement le fragment "' + id + '" ?')) return;
                var newFrags = [];
                for (var i = 0; i < fragments.length; i++) {
                    if (fragments[i].id !== id) newFrags.push(fragments[i]);
                }
                fragments = newFrags;
                assembledCode = '';
                pureCode = '';
                fullHtmlCode = '';
                saveFragments();
                render();
            }

            function reconstructTagged() {
                if (fragments.length === 0) { alert('Aucun fragment.'); return; }
                var parts = [];
                for (var i = 0; i < fragments.length; i++) {
                    parts.push('---FRAGMENT: ' + fragments[i].id + ' ---\n' + fragments[i].content + '\n---END---');
                }
                assembledCode = parts.join('\n\n');
                pureCode = '';
                fullHtmlCode = '';
                render();
            }

            function reconstructPure() {
                if (fragments.length === 0) { alert('Aucun fragment.'); return; }
                var parts = [];
                for (var i = 0; i < fragments.length; i++) {
                    parts.push(fragments[i].content);
                }
                pureCode = parts.join('\n\n');
                assembledCode = '';
                fullHtmlCode = '';
                render();
            }

            function downloadFullHtml() {
                if (fragments.length === 0) { alert('Aucun fragment.'); return; }
                var parts = [];
                for (var i = 0; i < fragments.length; i++) {
                    parts.push(fragments[i].content);
                }
                var pure = parts.join('\n\n');
                var fullHtml = buildFullHtml(pure);

                var blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
                var link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'cafet-test.html';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);

                fullHtmlCode = fullHtml;
                assembledCode = '';
                pureCode = '';
                render();
            }

            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(function() { alert('✅ Copié !'); })['catch'](function() {
                        fallbackCopy(text);
                    });
                } else { fallbackCopy(text); }
            }

            function fallbackCopy(text) {
                var ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                alert('✅ Copié !');
            }

            function toggleTheme() {
                theme = (theme === 'light' ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
                saveTheme();
                render();
            }

            function clearAll() {
                if (!confirm('Effacer tous les fragments ?')) return;
                fragments = [];
                assembledCode = '';
                pureCode = '';
                fullHtmlCode = '';
                saveFragments();
                render();
            }

            function openModal(id, content) {
                modal = { id: id, content: content };
                render();
                setTimeout(function() {
                    var ta = document.querySelector('.modal textarea');
                    if (ta) ta.focus();
                }, 50);
            }

            function closeModal() {
                modal = null;
                render();
            }

            function handleModalConfirm() {
                var ta = document.querySelector('.modal textarea');
                if (!ta) return;
                var content = ta.value;
                if (content.trim() === '') { alert('Le contenu ne peut pas être vide.'); return; }
                updateFragment(modal.id, content);
            }

            // ============================================================
            // RENDU
            // ============================================================
            function render() {
                var themeIcon = theme === 'light' ? '🌙 Mode Nuit' : '☀️ Mode Jour';
                var fragCount = fragments.length;

                var modalHtml = '';
                if (modal) {
                    modalHtml = '<div class="modal-overlay" id="modalOverlay">\n' +
                        '    <div class="modal">\n' +
                        '        <h2>✂️ Modification : <span style="color: var(--primary);">' + escapeHtml(modal.id) +
                        '</span></h2>\n' +
                        '        <textarea id="modalTextarea">' + escapeHtml(modal.content) + '</textarea>\n' +
                        '        <div class="modal-actions">\n' +
                        '            <button class="btn btn-outline" id="modalCancelBtn">Annuler</button>\n' +
                        '            <button class="btn btn-success" id="modalConfirmBtn">✅ Valider</button>\n' +
                        '        </div>\n' +
                        '    </div>\n' +
                        '</div>';
                }

                var fragmentsHtml = '';
                if (fragments.length === 0) {
                    fragmentsHtml = '<div class="empty-state">Aucun fragment pour l\'instant. Colle et découpe !</div>';
                } else {
                    var chips = '';
                    for (var i = 0; i < fragments.length; i++) {
                        var f = fragments[i];
                        var lines = f.content.split('\n').length;
                        var safeId = escapeHtml(f.id);
                        chips += '<div class="fragment-chip" data-id="' + safeId + '">\n' +
                            '    <span>📄 ' + safeId + '</span>\n' +
                            '    <span class="badge">' + lines + ' lignes</span>\n' +
                            '    <span class="del" data-id="' + safeId + '">✕</span>\n' +
                            '</div>\n';
                    }
                    fragmentsHtml = '<div class="fragment-grid">' + chips + '</div>';
                }

                var previewHtml = '';

                if (assembledCode) {
                    previewHtml += '<div class="preview-wrapper">\n' +
                        '    <div class="preview-header">\n' +
                        '        <strong>🧩 Code avec balises</strong>\n' +
                        '        <button class="btn-copy" data-copy="' + escapeHtml(assembledCode) + '">📋 Copier</button>\n' +
                        '    </div>\n' +
                        '    <textarea readonly style="min-height:150px;">' + escapeHtml(assembledCode) + '</textarea>\n' +
                        '</div>\n';
                }

                if (pureCode) {
                    previewHtml += '<div class="preview-wrapper">\n' +
                        '    <div class="preview-header">\n' +
                        '        <strong>⚡ Code PUR (JS/JSX brut)</strong>\n' +
                        '        <button class="btn-copy" data-copy="' + escapeHtml(pureCode) + '">📋 Copier</button>\n' +
                        '    </div>\n' +
                        '    <textarea readonly style="min-height:150px; border-color: var(--success);">' + escapeHtml(
                            pureCode) + '</textarea>\n' +
                        '</div>\n';
                }

                if (fullHtmlCode) {
                    previewHtml += '<div class="preview-wrapper">\n' +
                        '    <div class="preview-header">\n' +
                        '        <strong>📦 HTML complet (aperçu)</strong>\n' +
                        '        <button class="btn-copy" data-copy="' + escapeHtml(fullHtmlCode) +
                        '">📋 Copier</button>\n' +
                        '    </div>\n' +
                        '    <textarea readonly style="min-height:250px; border-color: #6f42c1; background: #0d1117; color: #e6e6e6;">' +
                        escapeHtml(fullHtmlCode) + '</textarea>\n' +
                        '</div>\n';
                }

                var html = '<div id="app-container">\n' +
                    '    <header class="header">\n' +
                    '        <h1>🧑‍⚕️ Chirurgien Vanilla <span>V2</span></h1>\n' +
                    '        <button class="theme-toggle" id="themeToggleBtn">' + themeIcon + '</button>\n' +
                    '    </header>\n' +
                    '    <div class="card">\n' +
                    '        <div class="card-title">📥 1. Colle le code balisé <small>(---FRAGMENT: Nom --- ... ---END---)</small></div>\n' +
                    '        <textarea id="rawTextarea" style="min-height:140px;" placeholder="Exemple :\n\n---FRAGMENT: MonComposant ---\nfunction Test() { return <div>Bonjour</div>; }\n---END---">' +
                    escapeHtml(rawInput) + '</textarea>\n' +
                    '        <div class="actions-row">\n' +
                    '            <button class="btn" id="parseBtn">✂️ Découper</button>\n' +
                    '            <span class="stats">' + fragCount + ' fragment' + (fragCount > 1 ? 's' : '') +
                    ' en mémoire</span>\n';

                if (fragCount > 0) {
                    html += '            <button class="btn btn-danger" id="clearAllBtn">🗑️ Effacer</button>\n';
                }

                html += '        </div>\n' +
                    '    </div>\n' +
                    '    <div class="card">\n' +
                    '        <div class="card-title">🎯 2. Fragments (clique pour modifier) <small>' + fragCount +
                    ' bloc(s)</small></div>\n' +
                    fragmentsHtml +
                    '    </div>\n' +
                    '    <div class="card">\n' +
                    '        <div class="card-title">🚀 3. Reconstruire</div>\n' +
                    '        <div class="tab-actions">\n' +
                    '            <button class="btn btn-warning" id="reconstructTaggedBtn"' + (fragCount === 0 ?
                        ' disabled' : '') + '>🧩 Avec balises</button>\n' +
                    '            <button class="btn btn-success" id="reconstructPureBtn"' + (fragCount === 0 ?
                        ' disabled' : '') + '>⚡ Code PUR</button>\n' +
                    '            <button class="btn btn-download" id="downloadHtmlBtn"' + (fragCount === 0 ?
                        ' disabled' : '') + '>📥 Télécharger HTML</button>\n' +
                    '        </div>\n' +
                    previewHtml +
                    '    </div>\n' +
                    modalHtml +
                    '</div>';

                app.innerHTML = html;

                // Événements
                var rawTa = document.getElementById('rawTextarea');
                if (rawTa) {
                    rawTa.addEventListener('input', function(e) {
                        rawInput = e.target.value;
                        saveRaw();
                    });
                }

                var parseBtn = document.getElementById('parseBtn');
                if (parseBtn) parseBtn.addEventListener('click', parseFragments);

                var clearBtn = document.getElementById('clearAllBtn');
                if (clearBtn) clearBtn.addEventListener('click', clearAll);

                var themeBtn = document.getElementById('themeToggleBtn');
                if (themeBtn) themeBtn.addEventListener('click', toggleTheme);

                var taggedBtn = document.getElementById('reconstructTaggedBtn');
                if (taggedBtn) taggedBtn.addEventListener('click', reconstructTagged);

                var pureBtn = document.getElementById('reconstructPureBtn');
                if (pureBtn) pureBtn.addEventListener('click', reconstructPure);

                var downloadBtn = document.getElementById('downloadHtmlBtn');
                if (downloadBtn) downloadBtn.addEventListener('click', downloadFullHtml);

                // Copie via data-copy
                var copyBtns = document.querySelectorAll('[data-copy]');
                for (var c = 0; c < copyBtns.length; c++) {
                    copyBtns[c].addEventListener('click', function() {
                        var text = this.dataset.copy;
                        copyToClipboard(text);
                    });
                }

                // Fragments chips
                var chips = document.querySelectorAll('.fragment-chip');
                for (var ch = 0; ch < chips.length; ch++) {
                    chips[ch].addEventListener('click', function(e) {
                        if (e.target.classList.contains('del')) return;
                        var id = this.dataset.id;
                        for (var f = 0; f < fragments.length; f++) {
                            if (fragments[f].id === id) {
                                openModal(id, fragments[f].content);
                                break;
                            }
                        }
                    });
                }

                var dels = document.querySelectorAll('.fragment-chip .del');
                for (var d = 0; d < dels.length; d++) {
                    dels[d].addEventListener('click', function(e) {
                        e.stopPropagation();
                        var id = this.dataset.id;
                        deleteFragment(id);
                    });
                }

                // Modal
                var overlay = document.getElementById('modalOverlay');
                if (overlay) {
                    overlay.addEventListener('click', function(e) {
                        if (e.target === this) closeModal();
                    });
                }

                var cancelBtn = document.getElementById('modalCancelBtn');
                if (cancelBtn) cancelBtn.addEventListener('click', closeModal);

                var confirmBtn = document.getElementById('modalConfirmBtn');
                if (confirmBtn) confirmBtn.addEventListener('click', handleModalConfirm);

                document.addEventListener('keydown', function escHandler(e) {
                    if (e.key === 'Escape' && modal) {
                        closeModal();
                        document.removeEventListener('keydown', escHandler);
                    }
                });
            }

            function escapeHtml(unsafe) {
                if (unsafe === undefined || unsafe === null) return '';
                var div = document.createElement('div');
                div.textContent = unsafe;
                return div.innerHTML;
            }

            // ============================================================
            // LANCEMENT
            // ============================================================
            loadState();
            render();
        })();
    </script>
</body>
</html>
